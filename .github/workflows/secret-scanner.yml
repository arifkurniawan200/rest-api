name: Secret Scanner

on:
  push:
    branches: [main, develop, "**"]
  pull_request:
    branches: [main]

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan for secrets
        run: |
          echo "🔍 Scanning codebase for leaked secrets..."
          python3 scan-secrets.py --path .
          
      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::⚠️ SECRET DETECTED! Check the scan output above."
          echo "::warning::Remove the credential from all files and history."
          echo "::warning::Run: git filter-branch / BFG Repo-Cleaner to purge from history."
